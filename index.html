<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymTrack PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .hidden { display: none !important; }
        body { -webkit-tap-highlight-color: transparent; }
        .bg-charcoal { background-color: #36454F; }
        .text-charcoal { color: #36454F; }
    </style>
</head>

<body class="bg-gray-100 font-sans pb-24">

<header class="bg-charcoal text-white p-5 shadow-md sticky top-0 z-10 rounded-b-xl">
    <h1 id="page-title" class="text-xl font-bold text-center tracking-tight">I Miei Allenamenti</h1>
</header>

<main id="app" class="p-4 max-w-md mx-auto">

    <!-- LISTA ALLENAMENTI -->
    <section id="view-workouts">
        <div id="workout-list" class="space-y-4"></div>
        <button onclick="showWorkoutEditor()" class="fixed bottom-28 right-6 bg-charcoal text-white w-16 h-16 rounded-full shadow-2xl text-4xl flex items-center justify-center">+</button>
    </section>

    <!-- EDITOR ALLENAMENTO -->
    <section id="view-editor" class="hidden">
        <div class="bg-white p-4 rounded-lg shadow-sm mb-4">
            <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Nome Allenamento</label>
            <input type="text" id="edit-workout-name" placeholder="Es. Upper Body" class="w-full p-3 rounded-lg border border-gray-200">
        </div>

        <div id="exercise-list" class="space-y-4"></div>

        <button onclick="addExerciseField()" class="w-full mt-4 bg-white p-3 rounded-lg border-2 border-dashed border-gray-300 text-gray-500 font-medium">+ Aggiungi Esercizio</button>

        <div class="flex gap-3 mt-8">
            <button onclick="saveWorkout()" class="flex-1 bg-green-600 text-white p-4 rounded-lg font-bold shadow-md">Salva</button>
            <button onclick="showView('workouts')" class="flex-1 bg-gray-400 text-white p-4 rounded-lg font-bold shadow-md">Annulla</button>
        </div>
    </section>

    <!-- ESECUZIONE ALLENAMENTO -->
    <section id="view-active" class="hidden">
        <h2 id="active-workout-name" class="text-2xl font-bold mb-6 text-charcoal text-center"></h2>
        <div id="active-exercises" class="space-y-6"></div>
        <button onclick="finishWorkout()" class="w-full mt-10 bg-green-600 text-white p-5 rounded-xl font-bold shadow-xl uppercase tracking-widest">Termina Allenamento</button>
    </section>

    <!-- CALENDARIO -->
    <section id="view-calendar" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <select id="calendar-month" class="p-2 border rounded"></select>
            <select id="calendar-year" class="p-2 border rounded"></select>
            <button onclick="renderCalendar()" class="bg-charcoal text-white px-4 py-2 rounded">Vai</button>
        </div>

        <div id="calendar-grid" class="bg-white p-4 rounded-xl shadow-sm grid grid-cols-7 gap-2 text-center border border-gray-100"></div>
        <div id="history-detail" class="mt-8 space-y-4"></div>
    </section>

</main>

<!-- TIMER -->
<div id="timer-overlay" class="hidden fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-50 text-white">
    <div class="text-7xl font-mono font-bold mb-2" id="timer-display">00:00</div>
    <p class="text-slate-400 uppercase tracking-widest mb-10">Recupero...</p>
    <button onclick="closeTimer()" class="bg-white/10 border border-white/20 px-10 py-3 rounded-full hover:bg-white/20 transition">Salta</button>
</div>

<!-- NAV -->
<nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button onclick="showView('workouts')" class="flex flex-col items-center gap-1 group">
        <span class="text-xs font-bold uppercase tracking-tighter text-gray-400">Workouts</span>
    </button>
    <button onclick="showView('calendar')" class="flex flex-col items-center gap-1 group">
        <span class="text-xs font-bold uppercase tracking-tighter text-gray-400">Calendario</span>
    </button>
</nav>

<script>
// --- DATI ---
let workouts = JSON.parse(localStorage.getItem('workouts')) || [];
let history = JSON.parse(localStorage.getItem('history')) || [];
let currentWorkout = null;
let timerInterval;

const beep = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

function saveData() {
    localStorage.setItem('workouts', JSON.stringify(workouts));
    localStorage.setItem('history', JSON.stringify(history));
}

// --- NAVIGAZIONE ---
function showView(view) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(`view-${view}`).classList.remove('hidden');
    if(view === 'workouts') renderWorkouts();
    if(view === 'calendar') renderCalendar();
}

// --- WORKOUT LIST ---
function renderWorkouts() {
    const list = document.getElementById('workout-list');
    list.innerHTML = workouts.map((w, i) => `
        <div class="bg-white p-4 rounded shadow flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg">${w.name}</h3>
                <p class="text-sm text-gray-500">${w.exercises.length} esercizi</p>
            </div>
            <div class="flex gap-2">
                <button onclick="startWorkout(${i})" class="bg-green-500 text-white p-2 rounded text-sm">Inizia</button>
                <button onclick="showWorkoutEditor(${i})" class="bg-blue-100 text-blue-600 p-2 rounded text-sm">Modifica</button>
                <button onclick="deleteWorkout(${i})" class="bg-red-100 text-red-600 p-2 rounded text-sm">Elimina</button>
            </div>
        </div>
    `).join('');
}

// --- EDITOR ---
function showWorkoutEditor(index = null) {
    showView('editor');
    const nameInput = document.getElementById('edit-workout-name');
    const list = document.getElementById('exercise-list');
    list.innerHTML = '';
    
    if(index !== null) {
        currentWorkout = { ...workouts[index], index };
        nameInput.value = currentWorkout.name;
        currentWorkout.exercises.forEach(ex => addExerciseField(ex));
    } else {
        currentWorkout = { name: '', exercises: [], index: null };
        nameInput.value = '';
        addExerciseField();
    }
}

function addExerciseField(data = { name: '', sets: 3, reps: 10, rest: 60 }) {
    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded border relative exercise-entry";
    div.innerHTML = `
        <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-500 text-xl">&times;</button>
        <input type="text" placeholder="Nome Esercizio" class="ex-name w-full mb-2 font-bold border-b" value="${data.name}">
        <div class="grid grid-cols-2 gap-2 text-sm">
            <label>Serie: <input type="number" class="ex-sets w-16 p-1 border rounded" value="${data.sets}"></label>
            <label>Reps target: <input type="number" class="ex-reps w-16 p-1 border rounded" value="${data.reps}"></label>
            <label>Recupero (sec): <input type="number" class="ex-rest w-16 p-1 border rounded" value="${data.rest}"></label>
        </div>
    `;
    document.getElementById('exercise-list').appendChild(div);
}

function saveWorkout() {
    const name = document.getElementById('edit-workout-name').value;
    const exercises = Array.from(document.querySelectorAll('.exercise-entry')).map(el => {
        const sets = parseInt(el.querySelector('.ex-sets').value);
        const repsTarget = parseInt(el.querySelector('.ex-reps').value);
        return {
            name: el.querySelector('.ex-name').value,
            rest: parseInt(el.querySelector('.ex-rest').value),
            sets: Array.from({ length: sets }, () => ({
                weight: 0,
                repsTarget,
                repsDone: 0
            }))
        };
    });

    const newWorkout = { name, exercises };
    if(currentWorkout.index !== null) workouts[currentWorkout.index] = newWorkout;
    else workouts.push(newWorkout);
    
    saveData();
    showView('workouts');
}

// --- ESECUZIONE ---
function startWorkout(index) {
    currentWorkout = JSON.parse(JSON.stringify(workouts[index]));
    showView('active');
    document.getElementById('active-workout-name').innerText = currentWorkout.name;
    renderActiveExercises();
}

function renderActiveExercises() {
    const container = document.getElementById('active-exercises');
    container.innerHTML = currentWorkout.exercises.map((ex, exIdx) => `
        <div class="bg-white p-4 rounded shadow">
            <h3 class="font-bold text-blue-600 mb-2">${ex.name} (${ex.rest}s rec)</h3>
            <div class="space-y-2">
                ${ex.sets.map((set, sIdx) => `
                    <div class="p-2 border-b last:border-0" id="set-${exIdx}-${sIdx}">
                        <div class="flex justify-between items-center mb-2">
                            <span>Serie ${sIdx + 1}</span>
                        </div>

                        <div class="flex items-center gap-2 mb-2">
                            <input type="number" value="${set.weight}" 
                                onchange="currentWorkout.exercises[${exIdx}].sets[${sIdx}].weight = Number(this.value)"
                                class="w-16 p-1 border rounded text-center"> kg

                            <input type="number" value="${set.repsDone}" 
                                onchange="currentWorkout.exercises[${exIdx}].sets[${sIdx}].repsDone = Number(this.value)"
                                class="w-16 p-1 border rounded text-center"> reps
                        </div>

                        <button onclick="completeSet(${exIdx}, ${sIdx}, ${ex.rest})" 
                            class="set-btn bg-gray-200 p-2 rounded w-full">✓ Completa serie</button>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function completeSet(exIdx, sIdx, rest) {
    const set = currentWorkout.exercises[exIdx].sets[sIdx];

    if(set.repsDone <= 0) {
        alert("Inserisci le ripetizioni effettive prima di completare la serie.");
        return;
    }

    const btn = document.querySelector(`#set-${exIdx}-${sIdx} .set-btn`);
    btn.classList.replace('bg-gray-200', 'bg-green-500');
    btn.classList.add('text-white');
    btn.disabled = true;

    startTimer(rest);
}

// --- TIMER mm:ss ---
function startTimer(seconds) {
    const overlay = document.getElementById('timer-overlay');
    const display = document.getElementById('timer-display');
    overlay.classList.remove('hidden');
    
    let timeLeft = seconds;
    updateTimerDisplay(timeLeft);

    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);

        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            beep.play().catch(() => {});
            closeTimer();
        }
    }, 1000);
}

function updateTimerDisplay(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    document.getElementById('timer-display').innerText = `${m}:${s}`;
}

function closeTimer() {
    clearInterval(timerInterval);
    document.getElementById('timer-overlay').classList.add('hidden');
}

function finishWorkout() {
    history.push({
        name: currentWorkout.name,
        date: new Date().toISOString().split('T')[0],
        exercises: currentWorkout.exercises
    });

    saveData();
    alert("Allenamento completato e salvato!");
    showView('workouts');
}

// --- CALENDARIO ---
function populateCalendarSelectors() {
    const monthSel = document.getElementById('calendar-month');
    const yearSel = document.getElementById('calendar-year');

    monthSel.innerHTML = [...Array(12).keys()].map(m => 
        `<option value="${m+1}">${m+1}</option>`
    ).join('');

    const currentYear = new Date().getFullYear();
    yearSel.innerHTML = [...Array(5).keys()].map(i => 
        `<option value="${currentYear - 2 + i}">${currentYear - 2 + i}</option>`
    ).join('');

    monthSel.value = new Date().getMonth() + 1;
    yearSel.value = currentYear;
}

function renderCalendar() {
    const month = parseInt(document.getElementById('calendar-month').value);
    const year = parseInt(document.getElementById('calendar-year').value);

    const grid = document.getElementById('calendar-grid');
    const detail = document.getElementById('history-detail');
    grid.innerHTML = '';
    detail.innerHTML = '';

    const daysInMonth = new Date(year, month, 0).getDate();

    for (let i = 1; i <= daysInMonth; i++) {
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const hasWorkout = history.some(h => h.date === dateStr);

        const dayEl = document.createElement('div');
        dayEl.className = `p-2 rounded text-sm ${hasWorkout ? 'bg-green-500 text-white font-bold cursor-pointer' : 'bg-gray-200'}`;
        dayEl.innerText = i;

        if(hasWorkout) dayEl.onclick = () => showHistoryDetail(dateStr);

        grid.appendChild(dayEl);
    }
}

function showHistoryDetail(date) {
    const sessions = history.filter(h => h.date === date);
    const detail = document.getElementById('history-detail');

    detail.innerHTML = `<h3 class="font-bold border-b pb-2">Allenamenti del ${date}</h3>`;

    sessions.forEach(s => {
        detail.innerHTML += `
            <div class="bg-white p-3 rounded shadow-sm text-sm">
                <p class="font-bold">${s.name}</p>
                ${s.exercises.map(ex => `
                    <p class="text-xs mt-2 font-semibold">${ex.name}</p>
                    ${ex.sets.map(set => `
                        <p class="text-xs ml-2">• ${set.weight}kg x ${set.repsDone} reps</p>
                    `).join('')}
                `).join('')}
            </div>
        `;
    });
}

// INIT
populateCalendarSelectors();
renderWorkouts();
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
